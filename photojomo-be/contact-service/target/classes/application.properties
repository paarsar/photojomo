spring.application.name=contact-service

# Spring Cloud Function - tells AWS adapter which function bean to invoke
spring.cloud.function.definition=saveContact

# DataSource is configured programmatically in DataSourceConfig from Secrets Manager (DB_SECRET_ARN)

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.photojomo=INFO
